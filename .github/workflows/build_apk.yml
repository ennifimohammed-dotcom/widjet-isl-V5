name: 🔨 Build APK - Widgets Islamiques

# 🚀 Déclencheurs
on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Pour lancer manuellement depuis l'interface GitHub
    inputs:
      build-type:
        description: 'Type de build'
        type: choice
        options:
          - 'debug'
          - 'release'
        default: 'release'
      upload-artifact:
        description: 'Uploader l''APK comme artifact ?'
        type: boolean
        default: true

# 📋 Variables d'environnement
env:
  APP_NAME: "Widgets Islamiques"
  FLUTTER_VERSION: "3.24.0"

jobs:
  # ============================================================
  # 📊 ANALYSE DU CODE (optionnel mais recommandé)
  # ============================================================
  analyze:
    name: 📊 Analyse statique
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 🔧 Disable Flutter analytics
        run: flutter config --no-analytics

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔍 Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

  # ============================================================
  # 🧪 TESTS
  # ============================================================
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 🔧 Disable Flutter analytics
        run: flutter config --no-analytics

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🧪 Run tests
        run: flutter test --no-pub || echo "⚠️ Pas de tests trouvés, on continue..."

  # ============================================================
  # 🤖 BUILD APK (le cœur du workflow)
  # ============================================================
  build-apk:
    name: 🤖 Build APK
    runs-on: ubuntu-latest
    needs: [ analyze ]  # Attendre l'analyse (enlever si trop lent)
    timeout-minutes: 45
    
    steps:
      # 📥 1. Récupérer le code
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 🐦 2. Installer Flutter
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: flutter-cache-${{ runner.os }}-${{ env.FLUTTER_VERSION }}

      # 📦 3. Installer les dépendances
      - name: 🔧 Disable Flutter analytics
        run: flutter config --no-analytics

      - name: 📦 Flutter pub get
        run: |
          flutter pub get
          flutter pub upgrade --major-versions || true

      # 🧹 4. Nettoyer le build précédent
      - name: 🧹 Clean previous build
        run: |
          flutter clean
          rm -rf build/
          rm -rf android/app/build/

      # 📝 5. Générer le fichier local.properties
      - name: 🔧 Setup Android SDK properties
        run: |
          mkdir -p android
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          echo "flutter.buildMode=release" >> android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties

      # 🔨 6. Builder l'APK (debug ou release)
      - name: 🔨 Build APK
        run: |
          BUILD_TYPE="${{ github.event.inputs.build-type || 'release' }}"
          
          if [ "$BUILD_TYPE" = "debug" ]; then
            echo "🔧 Building DEBUG APK..."
            flutter build apk --debug --target-platform android-arm64,android-arm
            APK_PATH="build/app/outputs/flutter-apk/app-debug.apk"
            APK_NAME="widgets-islamiques-debug.apk"
          else
            echo "🚀 Building RELEASE APK..."
            flutter build apk --release --split-per-abi --target-platform android-arm64,android-arm
            APK_PATH="build/app/outputs/flutter-apk/app-arm64-v8a-release.apk"
            APK_NAME="widgets-islamiques-release.apk"
          fi
          
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV

      # 📋 7. Lister les APKs générés
      - name: 📋 List generated APKs
        run: |
          echo "📱 APKs générés :"
          find build/app/outputs/flutter-apk/ -name "*.apk" -exec ls -lh {} \;

      # 📤 8. Uploader l'APK comme artifact
      - name: 📤 Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: widgets-islamiques-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30
          compression-level: 6
          if-no-files-found: error

      # 🏷️ 9. Créer une Release GitHub (seulement pour les tags)
      - name: 🏷️ Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ env.APP_NAME }} - ${{ github.ref_name }}"
          body: |
            ## 🕌 Widgets Islamiques - ${{ github.ref_name }}
            
            ### 📱 APK disponible en téléchargement
            
            | Architecture | Fichier |
            |-------------|---------|
            | ARM64-v8a | `app-arm64-v8a-release.apk` |
            | ARM v7 | `app-armeabi-v7a-release.apk` |
            
            ### ✨ Fonctionnalités
            - 🕌 Heures de prière (GPS + 14 méthodes de calcul)
            - 🧭 Direction Qibla (boussole en temps réel)
            - 📿 Adhkar du matin/soir (arabe + traduction)
            - 📅 Calendrier Hijri complet
            - 🔢 Compteur Tasbih numérique
            - 🔔 Notifications des prières
            
            ### 📦 Installation
            1. Téléchargez l'APK correspondant à votre appareil
            2. Activez "Sources inconnues" dans les paramètres
            3. Installez et profitez ! 🎉
            
            ---
            Build généré automatiquement par GitHub Actions ✓
          files: build/app/outputs/flutter-apk/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true

      # 📊 10. Résumé du build
      - name: 📊 Build Summary
        if: always()
        run: |
          echo "=============================================="
          echo "  🕌 Widgets Islamiques - Build Summary"
          echo "=============================================="
          echo "  Status    : ${{ job.status }}"
          echo "  Branch    : ${{ github.ref_name }}"
          echo "  Commit    : ${{ github.sha }}"
          echo "  Flutter   : ${{ env.FLUTTER_VERSION }}"
          echo "  APK name  : ${{ env.APK_NAME }}"
          echo "=============================================="

  # ============================================================
  # 📱 BUILD APP BUNDLE (pour le Play Store)
  # ============================================================
  build-appbundle:
    name: 📱 Build App Bundle (Play Store)
    runs-on: ubuntu-latest
    needs: [ analyze ]
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 🔧 Disable Flutter analytics
        run: flutter config --no-analytics

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔧 Setup keystore (dummy pour CI)
        run: |
          mkdir -p android
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

      - name: 📦 Build App Bundle
        run: flutter build appbundle --release

      - name: 📤 Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: widgets-islamiques-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: 📊 AAB Summary
        run: |
          echo "✅ App Bundle généré avec succès !"
          ls -lh build/app/outputs/bundle/release/
