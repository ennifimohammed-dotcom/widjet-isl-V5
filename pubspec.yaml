name: islamic_widgets
description: Une application mobile complete de widgets islamiques - Heures de priere, Adhkar, Qibla, Calendrier Hijri
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.5.0'

dependencies:
  flutter:
    sdk: flutter
  
  adhan_dart: ^1.0.2
  hijri: ^3.0.0
  
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  flutter_compass: ^0.8.1
  
  awesome_notifications: ^0.8.2
  
  provider: ^6.1.1
  
  shared_preferences: ^2.2.2
  
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  liquid_progress_indicator: ^0.4.0
  smooth_page_indicator: ^1.1.0
  
  intl: ^0.18.1
  
  http: ^1.1.2
  
  audioplayers: ^5.2.1
  
  url_launcher: ^6.2.2
  package_info_plus: ^5.0.1
  device_info_plus: ^9.1.1

dev_dependencies:
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
